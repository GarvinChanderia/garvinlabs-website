<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Revenue per recipient: average vs. top 10% of brands (Klaviyo, 2023)</title>
  <rect x="0" y="0" width="380" height="340" fill="#fcfcfb"/>
  <text x="190" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0b0b0b">Revenue per recipient: average vs. top 10%</text>

  <!-- gridlines -->
  <line x1="90" y1="191" x2="270" y2="191" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="90" y1="122" x2="270" y2="122" stroke="#e1e0d9" stroke-width="1"/>
  <text x="84" y="195" text-anchor="end" font-size="10.5" fill="#898781">$10</text>
  <text x="84" y="126" text-anchor="end" font-size="10.5" fill="#898781">$20</text>

  <!-- baseline -->
  <line x1="90" y1="260" x2="270" y2="260" stroke="#c3c2b7" stroke-width="1.2"/>

  <!-- bar 1: average -->
  <path d="M110,239 Q110,235 114,235 L130,235 Q134,235 134,239 L134,260 L110,260 Z" fill="#c3c2b7"/>
  <text x="122" y="225" text-anchor="middle" font-size="13" font-weight="600" fill="#0b0b0b">$3.65</text>
  <text x="122" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">Average,</text>
  <text x="122" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">all brands</text>

  <!-- bar 2: top decile -->
  <path d="M230,64 Q230,60 234,60 L250,60 Q254,60 254,64 L254,260 L230,260 Z" fill="#2a78d6"/>
  <text x="242" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#0b0b0b">$28.89</text>
  <text x="242" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">Top 10%</text>
  <text x="242" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">of brands</text>
  <text x="242" y="312" text-anchor="middle" font-size="10.5" fill="#898781">~8x average</text>
</svg>
