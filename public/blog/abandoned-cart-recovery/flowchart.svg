<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 1910" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Abandoned cart recovery: automation decision logic</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="1910" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Abandoned cart recovery: automation decision logic</text>

  <!-- ===== connectors (drawn first, sit behind nodes) ===== -->
  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="450" y1="239" x2="560" y2="239" marker-end="url(#arrow)"/>
    <line x1="320" y1="304" x2="320" y2="344" marker-end="url(#arrow)"/>
    <line x1="320" y1="408" x2="320" y2="438" marker-end="url(#arrow)"/>
    <line x1="320" y1="502" x2="320" y2="542" marker-end="url(#arrow)"/>
    <line x1="450" y1="607" x2="560" y2="607" marker-end="url(#arrow)"/>
    <line x1="320" y1="672" x2="320" y2="712" marker-end="url(#arrow)"/>
    <line x1="320" y1="776" x2="320" y2="806" marker-end="url(#arrow)"/>
    <line x1="320" y1="870" x2="320" y2="910" marker-end="url(#arrow)"/>
    <line x1="450" y1="975" x2="560" y2="975" marker-end="url(#arrow)"/>
    <line x1="320" y1="1040" x2="320" y2="1080" marker-end="url(#arrow)"/>
    <line x1="320" y1="1144" x2="320" y2="1174" marker-end="url(#arrow)"/>
    <line x1="450" y1="1239" x2="560" y2="1239" marker-end="url(#arrow)"/>
    <line x1="320" y1="1304" x2="320" y2="1344" marker-end="url(#arrow)"/>
    <line x1="320" y1="1474" x2="170" y2="1524" marker-end="url(#arrow)"/>
    <line x1="320" y1="1474" x2="470" y2="1524" marker-end="url(#arrow)"/>
    <line x1="170" y1="1588" x2="320" y2="1638" marker-end="url(#arrow)"/>
    <line x1="470" y1="1588" x2="320" y2="1638" marker-end="url(#arrow)"/>
    <line x1="450" y1="1703" x2="560" y2="1703" marker-end="url(#arrow)"/>
    <line x1="320" y1="1768" x2="320" y2="1808" marker-end="url(#arrow)"/>
  </g>

  <!-- ===== connector labels ===== -->
  <g font-size="11.5" fill="#52514e">
    <g><rect x="484" y="228" width="30" height="18" fill="#fcfcfb"/><text x="499" y="241" text-anchor="middle">Yes</text></g>
    <g><rect x="300" y="316" width="40" height="18" fill="#fcfcfb"/><text x="320" y="329" text-anchor="middle">No</text></g>
    <g><rect x="484" y="596" width="30" height="18" fill="#fcfcfb"/><text x="499" y="609" text-anchor="middle">Yes</text></g>
    <g><rect x="300" y="684" width="40" height="18" fill="#fcfcfb"/><text x="320" y="697" text-anchor="middle">No</text></g>
    <g><rect x="484" y="964" width="30" height="18" fill="#fcfcfb"/><text x="499" y="977" text-anchor="middle">Yes</text></g>
    <g><rect x="300" y="1052" width="40" height="18" fill="#fcfcfb"/><text x="320" y="1065" text-anchor="middle">No</text></g>
    <g><rect x="480" y="1228" width="40" height="18" fill="#fcfcfb"/><text x="500" y="1241" text-anchor="middle">No</text></g>
    <g><rect x="300" y="1316" width="40" height="18" fill="#fcfcfb"/><text x="320" y="1329" text-anchor="middle">Yes</text></g>
    <g><rect x="185" y="1488" width="72" height="18" fill="#fcfcfb"/><text x="221" y="1501" text-anchor="middle">High AOV</text></g>
    <g><rect x="393" y="1488" width="68" height="18" fill="#fcfcfb"/><text x="427" y="1501" text-anchor="middle">Low AOV</text></g>
    <g><rect x="484" y="1692" width="30" height="18" fill="#fcfcfb"/><text x="499" y="1705" text-anchor="middle">Yes</text></g>
    <g><rect x="300" y="1780" width="40" height="18" fill="#fcfcfb"/><text x="320" y="1793" text-anchor="middle">No</text></g>
  </g>

  <!-- ===== nodes ===== -->
  <g font-size="13" fill="#0b0b0b" text-anchor="middle">

    <!-- 1: start -->
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98"><tspan x="320" dy="0">Cart updated /</tspan><tspan x="320" dy="15">checkout created</tspan></text>

    <!-- 2: diamond - suppression check -->
    <polygon points="320,174 450,239 320,304 190,239" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="232"><tspan x="320" dy="0">Abandoned 3+ times</tspan><tspan x="320" dy="15">in last 14 days?</tspan></text>
    <rect x="560" y="207" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="235"><tspan x="690" dy="0">Suppress:</tspan><tspan x="690" dy="15">no automated sequence</tspan></text>

    <!-- 3/4: wait + touch 1 -->
    <rect x="190" y="344" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="380">Wait ~1 hour</text>

    <rect x="190" y="438" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="466"><tspan x="320" dy="0">Touch 1: item-specific</tspan><tspan x="320" dy="15">reminder</tspan></text>

    <!-- 5: diamond - order check #1 -->
    <polygon points="320,542 450,607 320,672 190,607" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="600"><tspan x="320" dy="0">Order placed</tspan><tspan x="320" dy="15">since?</tspan></text>
    <rect x="560" y="575" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="690" y="603"><tspan x="690" dy="0">Stop:</tspan><tspan x="690" dy="15">converted</tspan></text>

    <!-- 6/7: wait + touch 2 -->
    <rect x="190" y="712" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="740"><tspan x="320" dy="0">Wait: same day /</tspan><tspan x="320" dy="15">next morning</tspan></text>

    <rect x="190" y="806" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="843">Touch 2</text>

    <!-- 8: diamond - order check #2 -->
    <polygon points="320,910 450,975 320,1040 190,975" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="968"><tspan x="320" dy="0">Order placed</tspan><tspan x="320" dy="15">since?</tspan></text>
    <rect x="560" y="943" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="690" y="971"><tspan x="690" dy="0">Stop:</tspan><tspan x="690" dy="15">converted</tspan></text>

    <!-- 9: wait to 48-72h -->
    <rect x="190" y="1080" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="1108"><tspan x="320" dy="0">Wait to the</tspan><tspan x="320" dy="15">48-72h mark</tspan></text>

    <!-- 10: diamond - validity check -->
    <polygon points="320,1174 450,1239 320,1304 190,1239" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="1232"><tspan x="320" dy="0">Still in stock and</tspan><tspan x="320" dy="15">price unchanged?</tspan></text>
    <rect x="560" y="1207" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="1235"><tspan x="690" dy="0">Stop: cart no</tspan><tspan x="690" dy="15">longer valid</tspan></text>

    <!-- 11: diamond - AOV branch -->
    <polygon points="320,1344 450,1409 320,1474 190,1409" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="1402"><tspan x="320" dy="0">Cart value vs</tspan><tspan x="320" dy="15">AOV threshold</tspan></text>

    <rect x="40" y="1524" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="170" y="1552"><tspan x="170" dy="0">Touch 3: human-</tspan><tspan x="170" dy="15">reachable channel</tspan></text>

    <rect x="340" y="1524" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="470" y="1552"><tspan x="470" dy="0">Touch 3:</tspan><tspan x="470" dy="15">automated only</tspan></text>

    <!-- 12: diamond - final order check -->
    <polygon points="320,1638 450,1703 320,1768 190,1703" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="1696"><tspan x="320" dy="0">Order placed</tspan><tspan x="320" dy="15">since?</tspan></text>
    <rect x="560" y="1671" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="690" y="1699"><tspan x="690" dy="0">Stop:</tspan><tspan x="690" dy="15">recovered</tspan></text>

    <rect x="190" y="1808" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="1836"><tspan x="320" dy="0">Sequence ends:</tspan><tspan x="320" dy="15">not recovered</tspan></text>
  </g>
</svg>
