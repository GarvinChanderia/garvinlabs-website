<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Returns processing time: manual vs. automated approval and label steps</title>
  <rect x="0" y="0" width="380" height="340" fill="#fcfcfb"/>
  <text x="190" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0b0b0b">Returns processing time cut by half</text>

  <line x1="90" y1="260" x2="270" y2="260" stroke="#c3c2b7" stroke-width="1.2"/>

  <path d="M110,64 Q110,60 114,60 L146,60 Q150,60 150,64 L150,260 L110,260 Z" fill="#c3c2b7"/>
  <text x="130" y="50" text-anchor="middle" font-size="13" font-weight="600" fill="#0b0b0b">baseline</text>
  <text x="130" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">Manual approval</text>
  <text x="130" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">and label steps</text>

  <path d="M230,161 Q230,157 234,157 L250,157 Q254,157 254,161 L254,260 L230,260 Z" fill="#2a78d6"/>
  <text x="242" y="147" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">-50%</text>
  <text x="242" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">Automated policy</text>
  <text x="242" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">check + label</text>
  <text x="242" y="312" text-anchor="middle" font-size="10.5" fill="#898781">AfterShip research, via Opensend</text>
</svg>
