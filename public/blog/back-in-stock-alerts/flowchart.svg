<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 866" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Back-in-stock alerts: variant-level match and notify logic</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="866" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Back-in-stock alerts: variant-level match and notify logic</text>

  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="320" y1="238" x2="320" y2="278" marker-end="url(#arrow)"/>
    <line x1="450" y1="343" x2="560" y2="343" marker-end="url(#arrow)"/>
    <line x1="320" y1="408" x2="320" y2="448" marker-end="url(#arrow)"/>
    <line x1="320" y1="512" x2="320" y2="552" marker-end="url(#arrow)"/>
    <line x1="450" y1="617" x2="560" y2="617" marker-end="url(#arrow)"/>
    <line x1="320" y1="682" x2="320" y2="722" marker-end="url(#arrow)"/>
  </g>

  <g font-size="11.5" fill="#52514e">
    <g><rect x="300" y="253" width="40" height="18" fill="#fcfcfb"/><text x="320" y="266" text-anchor="middle">Yes</text></g>
    <g><rect x="484" y="333" width="30" height="18" fill="#fcfcfb"/><text x="499" y="346" text-anchor="middle">No</text></g>
    <g><rect x="300" y="527" width="40" height="18" fill="#fcfcfb"/><text x="320" y="540" text-anchor="middle">No</text></g>
    <g><rect x="484" y="607" width="30" height="18" fill="#fcfcfb"/><text x="499" y="620" text-anchor="middle">Yes</text></g>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98"><tspan x="320" dy="0">Waitlist capture:</tspan><tspan x="320" dy="15">product + exact variant ID</tspan></text>

    <rect x="190" y="174" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="202"><tspan x="320" dy="0">Continuous variant-level</tspan><tspan x="320" dy="15">inventory watch</tspan></text>

    <polygon points="320,278 450,343 320,408 190,343" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="336"><tspan x="320" dy="0">Variant restocked</tspan><tspan x="320" dy="15">(0 to available)?</tspan></text>
    <rect x="560" y="311" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="339"><tspan x="690" dy="0">Not yet:</tspan><tspan x="690" dy="15">keep watching</tspan></text>

    <rect x="190" y="448" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="476"><tspan x="320" dy="0">Match waitlist for</tspan><tspan x="320" dy="15">that exact variant</tspan></text>

    <polygon points="320,552 450,617 320,682 190,617" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="610"><tspan x="320" dy="0">Notified count exceeds</tspan><tspan x="320" dy="15">units restocked?</tspan></text>
    <rect x="560" y="585" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="613"><tspan x="690" dy="0">Throttle / cap</tspan><tspan x="690" dy="15">the notified group</tspan></text>

    <rect x="190" y="722" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="320" y="750"><tspan x="320" dy="0">Send now: direct link</tspan><tspan x="320" dy="15">to the exact variant</tspan></text>
  </g>
</svg>
