<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 220" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Back-in-stock alert conversion rate: BirkenstockCentral.com case study</title>
  <rect x="0" y="0" width="380" height="220" fill="#fcfcfb"/>
  <rect x="20" y="20" width="340" height="180" rx="10" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.4"/>
  <text x="190" y="98" text-anchor="middle" font-size="44" font-weight="700" fill="#2a78d6">22.45%</text>
  <text x="190" y="126" text-anchor="middle" font-size="13" fill="#0b0b0b">conversion rate on back-in-stock alert emails</text>
  <text x="190" y="146" text-anchor="middle" font-size="11.5" fill="#52514e">BirkenstockCentral.com, MarketingSherpa case study, 2011</text>
  <text x="190" y="176" text-anchor="middle" font-size="10.5" fill="#898781">One retailer, one program: illustrative, not an industry benchmark</text>
</svg>
