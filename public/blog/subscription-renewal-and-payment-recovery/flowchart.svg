<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 656" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Payment recovery: pre-emptive reminder and retry logic</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="656" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Payment recovery: pre-emptive reminder and retry logic</text>

  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="320" y1="238" x2="320" y2="278" marker-end="url(#arrow)"/>
    <line x1="320" y1="342" x2="320" y2="382" marker-end="url(#arrow)"/>
    <line x1="320" y1="512" x2="320" y2="552" marker-end="url(#arrow)"/>
    <line x1="450" y1="447" x2="560" y2="447" marker-end="url(#arrow)"/>
    <line x1="690" y1="479" x2="690" y2="519" marker-end="url(#arrow)"/>
  </g>

  <g font-size="11.5" fill="#52514e">
    <g><rect x="300" y="522" width="40" height="18" fill="#fcfcfb"/><text x="320" y="535" text-anchor="middle">Yes</text></g>
    <g><rect x="484" y="437" width="30" height="18" fill="#fcfcfb"/><text x="499" y="450" text-anchor="middle">No</text></g>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98"><tspan x="320" dy="0">Daily pull: card expiry</tspan><tspan x="320" dy="15">+ charge-status data</tspan></text>

    <rect x="190" y="174" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="202"><tspan x="320" dy="0">Flag anything expiring</tspan><tspan x="320" dy="15">in the next 30-45 days</tspan></text>

    <rect x="190" y="278" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="306"><tspan x="320" dy="0">Pre-emptive reminder sent,</tspan><tspan x="320" dy="15">plenty of runway, no urgency tone</tspan></text>

    <polygon points="320,382 450,447 320,512 190,447" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="440"><tspan x="320" dy="0">Charge attempt</tspan><tspan x="320" dy="15">succeeds?</tspan></text>
    <rect x="560" y="415" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="690" y="443"><tspan x="690" dy="0">Retry sequence: retry,</tspan><tspan x="690" dy="15">friendlier reminder, final notice</tspan></text>

    <rect x="190" y="552" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="320" y="580"><tspan x="320" dy="0">Renewal proceeds, ops sees</tspan><tspan x="320" dy="15">the confirmed shipment</tspan></text>

    <rect x="560" y="519" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="547"><tspan x="690" dy="0">Final retry fails:</tspan><tspan x="690" dy="15">ops notified, treated as lapsed</tspan></text>
  </g>
</svg>
