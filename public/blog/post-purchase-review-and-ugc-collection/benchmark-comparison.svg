<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 340" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Product page conversion: no reviews vs. one or more reviews (PowerReviews)</title>
  <rect x="0" y="0" width="380" height="340" fill="#fcfcfb"/>
  <text x="190" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0b0b0b">Conversion: no reviews vs. one or more</text>

  <line x1="90" y1="260" x2="270" y2="260" stroke="#c3c2b7" stroke-width="1.2"/>

  <path d="M110,187 Q110,183 114,183 L130,183 Q134,183 134,187 L134,260 L110,260 Z" fill="#c3c2b7"/>
  <text x="122" y="173" text-anchor="middle" font-size="13" font-weight="600" fill="#0b0b0b">baseline</text>
  <text x="122" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">Product page,</text>
  <text x="122" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">no reviews</text>

  <path d="M230,64 Q230,60 234,60 L250,60 Q254,60 254,64 L254,260 L230,260 Z" fill="#2a78d6"/>
  <text x="242" y="50" text-anchor="middle" font-size="13" font-weight="700" fill="#0b0b0b">+52.2%</text>
  <text x="242" y="283" text-anchor="middle" font-size="11.5" fill="#52514e">One or more</text>
  <text x="242" y="297" text-anchor="middle" font-size="11.5" fill="#52514e">real reviews</text>
  <text x="242" y="312" text-anchor="middle" font-size="10.5" fill="#898781">PowerReviews research</text>
</svg>
