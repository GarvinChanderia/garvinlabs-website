<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Freshworks 2025 research: AI resolution and response time impact</title>
  <defs>
    <marker id="darr" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="0">
      <path d="M0,0 L10,0 L5,10 z" fill="#a39f92"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="300" fill="#fcfcfb"/>
  <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="600" fill="#0b0b0b">AI-handled support: retail benchmark (Freshworks Freddy AI Agent)</text>

  <line x1="310" y1="50" x2="310" y2="235" stroke="#e1e0d9" stroke-width="1"/>
  <line x1="610" y1="50" x2="610" y2="235" stroke="#e1e0d9" stroke-width="1"/>

  <!-- column 1: share resolved -->
  <text x="160" y="150" text-anchor="middle" font-size="40" font-weight="700" fill="#2a78d6">53%</text>
  <text x="160" y="180" text-anchor="middle" font-size="12.5" fill="#0b0b0b">of incoming queries resolved</text>
  <text x="160" y="197" text-anchor="middle" font-size="12.5" fill="#0b0b0b">by AI, no human needed</text>

  <!-- column 2: first response time -->
  <text x="460" y="70" text-anchor="middle" font-size="11" fill="#898781">before</text>
  <text x="460" y="98" text-anchor="middle" font-size="21" font-weight="600" fill="#c3c2b7">~12 min</text>
  <line x1="460" y1="108" x2="460" y2="132" stroke="#a39f92" stroke-width="1.6" marker-end="url(#darr)"/>
  <text x="460" y="168" text-anchor="middle" font-size="28" font-weight="700" fill="#2a78d6">~12 sec</text>
  <text x="460" y="195" text-anchor="middle" font-size="12.5" fill="#0b0b0b">first response time</text>

  <!-- column 3: resolution time -->
  <text x="760" y="70" text-anchor="middle" font-size="11" fill="#898781">before</text>
  <text x="760" y="98" text-anchor="middle" font-size="21" font-weight="600" fill="#c3c2b7">60+ min</text>
  <line x1="760" y1="108" x2="760" y2="132" stroke="#a39f92" stroke-width="1.6" marker-end="url(#darr)"/>
  <text x="760" y="168" text-anchor="middle" font-size="28" font-weight="700" fill="#2a78d6">~2 min</text>
  <text x="760" y="195" text-anchor="middle" font-size="12.5" fill="#0b0b0b">resolution time</text>

  <text x="450" y="255" text-anchor="middle" font-size="10.5" fill="#898781">Freshworks reporting on its own Freddy AI Agent customers, 2025</text>
  <text x="450" y="271" text-anchor="middle" font-size="10.5" fill="#898781">vendor-reported result, not independent third-party research</text>
</svg>
