<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 760" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Shipping and tracking: capture, milestone, and stall logic</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="760" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Shipping and tracking: capture, milestone, and stall logic</text>

  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="320" y1="238" x2="320" y2="278" marker-end="url(#arrow)"/>
    <line x1="320" y1="342" x2="320" y2="382" marker-end="url(#arrow)"/>
    <line x1="320" y1="446" x2="320" y2="486" marker-end="url(#arrow)"/>
    <line x1="450" y1="551" x2="560" y2="551" marker-end="url(#arrow)"/>
    <line x1="320" y1="616" x2="320" y2="656" marker-end="url(#arrow)"/>
  </g>

  <g font-size="11.5" fill="#52514e">
    <g><rect x="484" y="542" width="30" height="18" fill="#fcfcfb"/><text x="499" y="555" text-anchor="middle">Yes</text></g>
    <g><rect x="300" y="628" width="40" height="18" fill="#fcfcfb"/><text x="320" y="641" text-anchor="middle">No</text></g>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98">Shipping label created</text>

    <rect x="190" y="174" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="202"><tspan x="320" dy="0">Webhook fires: capture</tspan><tspan x="320" dy="15">tracking number + carrier</tspan></text>

    <rect x="190" y="278" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="306"><tspan x="320" dy="0">Immediate branded first</tspan><tspan x="320" dy="15">notification, tracking link</tspan></text>

    <rect x="190" y="382" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="410"><tspan x="320" dy="0">Poll carrier at milestones</tspan><tspan x="320" dy="15">(picked up, transit, out for delivery)</tspan></text>

    <polygon points="320,486 450,551 320,616 190,551" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="544"><tspan x="320" dy="0">No update 48-72h past</tspan><tspan x="320" dy="15">expected window?</tspan></text>
    <rect x="560" y="519" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="547"><tspan x="690" dy="0">Stall flagged: proactive note</tspan><tspan x="690" dy="15">or a support heads-up</tspan></text>

    <rect x="190" y="656" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="320" y="684">Delivered milestone notification</text>
  </g>
</svg>
