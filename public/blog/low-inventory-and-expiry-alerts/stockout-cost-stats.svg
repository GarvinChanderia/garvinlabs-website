<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 230" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>The cost of stockouts: global retail, Aislestock 2026 research</title>
  <rect x="0" y="0" width="700" height="230" fill="#fcfcfb"/>
  <line x1="350" y1="20" x2="350" y2="200" stroke="#e1e0d9" stroke-width="1"/>

  <rect x="20" y="20" width="310" height="180" rx="10" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.4"/>
  <text x="175" y="98" text-anchor="middle" font-size="36" font-weight="700" fill="#2a78d6">$1.2T</text>
  <text x="175" y="126" text-anchor="middle" font-size="13" fill="#0b0b0b">lost to stockouts across</text>
  <text x="175" y="144" text-anchor="middle" font-size="13" fill="#0b0b0b">global retail every year</text>

  <rect x="370" y="20" width="310" height="180" rx="10" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.4"/>
  <text x="525" y="98" text-anchor="middle" font-size="36" font-weight="700" fill="#2a78d6">55%</text>
  <text x="525" y="126" text-anchor="middle" font-size="13" fill="#0b0b0b">of shoppers permanently</text>
  <text x="525" y="144" text-anchor="middle" font-size="13" fill="#0b0b0b">switch after repeated stockouts</text>

  <text x="350" y="218" text-anchor="middle" font-size="10.5" fill="#898781">Aislestock, 2026 retail stock management research (up to 55%)</text>
</svg>
