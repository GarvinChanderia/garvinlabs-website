<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 592" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Low inventory and expiry: two parallel monitoring clocks</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="592" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Low inventory and expiry: two parallel monitoring clocks</text>

  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="320" y1="304" x2="320" y2="344" marker-end="url(#arrow)"/>
    <line x1="690" y1="134" x2="690" y2="174" marker-end="url(#arrow)"/>
    <line x1="690" y1="304" x2="690" y2="344" marker-end="url(#arrow)"/>
    <line x1="320" y1="408" x2="405" y2="448" marker-end="url(#arrow)"/>
    <line x1="690" y1="408" x2="605" y2="448" marker-end="url(#arrow)"/>
  </g>

  <g font-size="10.5" fill="#898781" text-anchor="middle">
    <text x="320" y="320">else: keep polling</text>
    <text x="690" y="320">else: keep polling</text>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98"><tspan x="320" dy="0">Pull stock levels via API</tspan><tspan x="320" dy="15">(continuous poll)</tspan></text>

    <polygon points="320,174 450,239 320,304 190,239" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="320" y="232"><tspan x="320" dy="0">Crosses this SKU's</tspan><tspan x="320" dy="15">sell-through threshold?</tspan></text>

    <rect x="190" y="344" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="320" y="372"><tspan x="320" dy="0">Draft reorder generated +</tspan><tspan x="320" dy="15">same-day notification</tspan></text>

    <rect x="560" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="690" y="98"><tspan x="690" dy="0">Track batch / lot expiry</tspan><tspan x="690" dy="15">date (parallel clock)</tspan></text>

    <polygon points="690,174 820,239 690,304 560,239" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="690" y="232"><tspan x="690" dy="0">Within days-to-expiry</tspan><tspan x="690" dy="15">threshold?</tspan></text>

    <rect x="560" y="344" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="690" y="372"><tspan x="690" dy="0">Clearance / bundle alert</tspan><tspan x="690" dy="15">fires early enough to act</tspan></text>

    <rect x="355" y="448" width="300" height="64" rx="8" fill="#eef4fc" stroke="#2a78d6" stroke-width="1.6"/>
    <text x="505" y="476"><tspan x="505" dy="0">Both flags logged together:</tspan><tspan x="505" dy="15">stock-level and expiry, reviewed as one</tspan></text>
  </g>
</svg>
