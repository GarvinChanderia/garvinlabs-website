<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 486" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <title>Quiz-to-recommendation: match and send logic</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a39f92"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="920" height="486" fill="#fcfcfb"/>
  <text x="460" y="34" text-anchor="middle" font-size="18" font-weight="600" fill="#0b0b0b">Quiz-to-recommendation: match and send logic</text>

  <g stroke="#a39f92" stroke-width="1.6" fill="none">
    <line x1="320" y1="134" x2="320" y2="174" marker-end="url(#arrow)"/>
    <line x1="320" y1="238" x2="320" y2="278" marker-end="url(#arrow)"/>
    <line x1="320" y1="342" x2="320" y2="382" marker-end="url(#arrow)"/>
  </g>

  <g font-size="13" fill="#0b0b0b" text-anchor="middle">
    <rect x="190" y="70" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#898781" stroke-width="1.4"/>
    <text x="320" y="98"><tspan x="320" dy="0">Quiz completion event</tspan><tspan x="320" dy="15">fires immediately</tspan></text>

    <rect x="190" y="174" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="202"><tspan x="320" dy="0">Matching layer: answers scored</tspan><tspan x="320" dy="15">against the product / plan catalog</tspan></text>

    <rect x="190" y="278" width="260" height="64" rx="8" fill="#fcfcfb" stroke="#c3c2b7" stroke-width="1.4"/>
    <text x="320" y="306"><tspan x="320" dy="0">Message references specific</tspan><tspan x="320" dy="15">answers, not just a name</tspan></text>

    <rect x="190" y="382" width="260" height="64" rx="8" fill="#f2f1ee" stroke="#0ca30c" stroke-width="1.4"/>
    <text x="320" y="410"><tspan x="320" dy="0">Send within minutes,</tspan><tspan x="320" dy="15">while intent is still fresh</tspan></text>
  </g>
</svg>
